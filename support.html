<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>サポート</title>
</head>
<body>
  <h1>サポート</h1>

  <p>SKEYをご利用いただきありがとうございます。</p>

  <h2>よくある質問</h2>

  <h3>写真はどこに保存されますか？</h3>
  <p>インポートした写真は、アプリ内の保存領域に保存されます。</p>

  <h3>パスコードを設定できますか？</h3>
  <p>はい。設定画面から6桁のパスコードを設定できます。</p>

  <h3>広告を消すことはできますか？</h3>
  <p>はい。設定画面の「広告削除・購入復元」から広告削除を購入できます。</p>

  <h3>購入を復元できますか？</h3>
  <p>はい。機種変更や再インストール後は、設定画面から購入を復元できます。</p>

  <h2>お問い合わせ</h2>
  <p>不具合やご質問がある場合は、App Storeのレビューまたはサポート情報よりお問い合わせください。</p>
</body>
</html>
